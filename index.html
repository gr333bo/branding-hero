<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Branding Hero: CMYK Edition</title>
    <style>
        body { margin: 0; background: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #game-ui { width: 100%; max-width: 500px; display: flex; justify-content: space-between; padding: 15px; box-sizing: border-box; font-weight: 900; position: absolute; top: 0; }
        canvas { background: #fff; width: 100%; max-width: 500px; touch-action: none; border-bottom: 2px solid #f0f0f0; }
        
        #controls { position: relative; width: 240px; height: 240px; margin-top: 20px; }
        .btn { position: absolute; width: 80px; height: 80px; cursor: pointer; user-select: none; transition: transform 0.05s; background-size: contain; background-repeat: no-repeat; border: none; outline: none; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.9); }
        
        /* Diamond Layout mapping to your button-x.svg assets */
        .c { top: 80px; left: 0; background-image: url('assets/button-c.svg'); }
        .m { top: 80px; right: 0; background-image: url('assets/button-m.svg'); }
        .y { top: 0; left: 80px; background-image: url('assets/button-y.svg'); }
        .k { bottom: 0; left: 80px; background-image: url('assets/button-k.svg'); }
        
        #overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .heart { width: 25px; height: 25px; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div style="font-size: 18px;">SCORE: <span id="score">0</span> <span id="mult" style="color:#ffcc00; margin-left:10px;">1x</span></div>
        <div id="lives-container"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="btn y" onmousedown="press('Y')" onmouseup="release('Y')" ontouchstart="press('Y')" ontouchend="release('Y')"></div>
        <div class="btn c" onmousedown="press('C')" onmouseup="release('C')" ontouchstart="press('C')" ontouchend="release('C')"></div>
        <div class="btn m" onmousedown="press('M')" onmouseup="release('M')" ontouchstart="press('M')" ontouchend="release('M')"></div>
        <div class="btn k" onmousedown="press('K')" onmouseup="release('K')" ontouchstart="press('K')" ontouchend="release('K')"></div>
    </div>

    <div id="overlay">
        <img src="assets/branding-hero-logo.svg" style="width: 220px; margin-bottom: 20px;">
        <h1 style="letter-spacing: 2px;">SHIFT COMPLETE</h1>
        <p id="final-score" style="font-size: 28px; font-weight: 900; color: #000; margin-top: 0;"></p>
        <button onclick="location.reload()" style="background:#000; color:#fff; padding:18px 45px; border:none; border-radius:50px; font-weight:bold; cursor:pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">RESTART SHIFT</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 500; canvas.height = 380;

    // --- ASSET PRELOADING ---
    const assets = {};
    const assetList = [
        'polo-base', 'polo-branded', 
        'banner-base', 'banner-branded', 
        'sign-base', 'sign-branded', 
        'mug-base', 'mug-branded',
        'branding-hero-logo',
        'heart-active', 'heart-inactive'
    ];
    
    assetList.forEach(name => {
        assets[name] = new Image();
        assets[name].src = `assets/${name}.svg`;
    });

    let score = 0, combo = 0, lives = 3, gameActive = true, speed = 4.2;
    let items = [];
    let activeKeys = new Set();
    const needleX = 250;

    function press(key) { activeKeys.add(key); }
    function release(key) { activeKeys.delete(key); }

    function updateLivesUI() {
        const container = document.getElementById('lives-container');
        container.innerHTML = '';
        for(let i=0; i<3; i++) {
            const img = document.createElement('img');
            img.src = i < lives ? 'assets/heart-active.svg' : 'assets/heart-inactive.svg';
            img.className = 'heart';
            container.appendChild(img);
        }
    }

    function spawn() {
        if(!gameActive) return;
        const types = [
            { id: 'polo', mech: 'tap', displayH: 85 },
            { id: 'banner', mech: 'hold', displayH: 65 },
            { id: 'sign', mech: 'chord', displayH: 100 },
            { id: 'mug', mech: 'rapid', displayH: 75 }
        ];
        const type = types[Math.floor(Math.random() * types.length)];
        const colors = ['C', 'M', 'Y', 'K'];
        
        items.push({
            ...type,
            x: -250, y: 140,
            col1: colors[Math.floor(Math.random() * 4)],
            col2: colors[Math.floor(Math.random() * 4)],
            progress: 0,
            hit: false, processed: false
        });
        setTimeout(spawn, Math.max(650, 1950 - (score * 1.3)));
    }

    function draw() {
        if(!gameActive) return;
        ctx.clearRect(0,0,500,380);

        // Active Branding Zone Visual
        ctx.strokeStyle = combo >= 10 ? "#ffcc00" : "#f4f4f4";
        ctx.lineWidth = 4;
        ctx.strokeRect(needleX - 50, 125, 100, 140);

        items.forEach(item => {
            item.x += speed;
            const imgKey = item.hit ? `${item.id}-branded` : `${item.id}-base`;
            const img = assets[imgKey];
            
            if(img.complete && img.width > 0) {
                const ratio = img.width / img.height;
                const finalW = item.displayH * ratio;
                
                // Keep Original Aspect Ratio
                ctx.drawImage(img, item.x, item.y, finalW, item.displayH);

                if(!item.hit) {
                    ctx.fillStyle = "#000"; ctx.font = "900 18px Arial";
                    let txt = item.col1;
                    if(item.mech === 'chord') txt += " + " + item.col2;
                    if(item.mech === 'rapid') txt += " (TAP!)";
                    ctx.fillText(txt, item.x, item.y - 15);
                }

                // Center-based collision window
                const center = item.x + finalW/2;
                const inZone = center > needleX - 50 && center < needleX + 50;

                if(inZone && !item.processed) {
                    if(item.mech === 'tap' && activeKeys.has(item.col1)) success(item);
                    if(item.mech === 'chord' && activeKeys.has(item.col1) && activeKeys.has(item.col2)) success(item);
                    if(item.mech === 'hold' && activeKeys.has(item.col1)) {
                        item.progress += 2.8; if(item.progress >= 100) success(item);
                    }
                    if(item.mech === 'rapid' && activeKeys.has(item.col1)) {
                        item.progress += 9; if(item.progress >= 100) success(item);
                    }
                }

                if(item.x > needleX + 80 && !item.hit && !item.processed) {
                    item.processed = true; fail();
                }
            }
        });
        items = items.filter(i => i.x < 600);
        requestAnimationFrame(draw);
    }

    function success(item) {
        item.hit = true; item.processed = true;
        combo++; 
        let currentMult = Math.min(5, Math.floor(combo/5)+1);
        score += (10 * currentMult);
        document.getElementById('score').innerText = score;
        document.getElementById('mult').innerText = currentMult + "x";
    }

    function fail() {
        combo = 0; lives--; updateLivesUI();
        document.getElementById('mult').innerText = "1x";
        if(lives <= 0) { 
            gameActive = false; 
            document.getElementById('overlay').style.display = 'flex'; 
            document.getElementById('final-score').innerText = "UNITS PROCESSED: " + score; 
        }
    }

    updateLivesUI(); spawn(); draw();
</script>
</body>
</html>
