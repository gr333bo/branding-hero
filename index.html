<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Branding Hero</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #111111; color: #ffffff; font-family: sans-serif; overflow: hidden; 
        }
        
        #hud { 
            position: absolute; top: 0; left: 0; width: 100%; height: 140px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px; background: transparent; z-index: 10;
        }
        #stats { width: 100%; max-width: 400px; display: flex; justify-content: space-between; font-weight: 900; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* Ticket Box - 90% Solid White */
        #job-preview { 
            height: 70px; display: flex; align-items: center; justify-content: center;
            gap: 12px; background: rgba(255,255,255,0.9); border-radius: 12px; 
            padding: 5px 25px; min-width: 160px; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .ticket-img { height: 42px; width: auto; } 

        #controls-wrapper {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 320px;
            display: flex; align-items: center; justify-content: center; background: transparent; z-index: 10;
        }
        #controls { position: relative; width: 280px; height: 280px; }
        .btn { position: absolute; width: 100px; height: 100px; background-size: contain; background-repeat: no-repeat; cursor: pointer; }
        .y { top: 0; left: 90px; background-image: url('assets/button-y.svg'); }
        .c { top: 90px; left: 0; background-image: url('assets/button-c.svg'); }
        .m { top: 90px; right: 0; background-image: url('assets/button-m.svg'); }
        .k { bottom: 0; left: 90px; background-image: url('assets/button-k.svg'); }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #overlay { 
            display: none; position: fixed; inset: 0; background: #111111; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; text-align: center; color: #ffffff; 
        }
        .heart { width: 22px; height: 22px; margin-left: 4px; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="stats">
            <div>SCORE: <span id="score">0</span> <span id="mult" style="color:#ffcc00">1x</span></div>
            <div id="lives-container"></div>
        </div>
        <div id="job-preview"><div id="ticket-area" style="display:flex; align-items:center; gap:10px;"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls-wrapper">
        <div id="controls">
            <div class="btn y" onmousedown="btnDown('Y')" onmouseup="btnUp('Y')" ontouchstart="btnDown('Y')" ontouchend="btnUp('Y')"></div>
            <div class="btn c" onmousedown="btnDown('C')" onmouseup="btnUp('C')" ontouchstart="btnDown('C')" ontouchend="btnUp('C')"></div>
            <div class="btn m" onmousedown="btnDown('M')" onmouseup="btnUp('M')" ontouchstart="btnDown('M')" ontouchend="btnUp('M')"></div>
            <div class="btn k" onmousedown="btnDown('K')" onmouseup="btnUp('K')" ontouchstart="btnDown('K')" ontouchend="btnUp('K')"></div>
        </div>
    </div>

    <div id="overlay">
        <img src="assets/branding-hero-logo.svg" style="width:200px; margin-bottom:20px;">
        <h1 id="final-score"></h1>
        <button onclick="location.reload()" style="background:#ffffff; color:#111111; padding:15px 40px; border:none; border-radius:50px; font-weight:bold; font-size:18px; cursor:pointer;">RESTART SHIFT</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const assets = {};
    const assetList = [
        'polo-base', 'polo-branded', 'banner-base', 'banner-branded', 
        'sign-base', 'sign-branded', 'mug-base', 'mug-branded', 
        'heart-active', 'heart-inactive', 'background',
        'button-c', 'button-m', 'button-y', 'button-k',
        'long-c', 'long-m', 'long-y', 'long-k'
    ];
    
    let score = 0, combo = 0, lives = 3, gameActive = false, speed = 2.5, items = [], activeKeys = new Set();

    assetList.forEach(name => { assets[name] = new Image(); assets[name].src = `assets/${name}.svg`; });

    // Improved Input Handling
    function btnDown(key) {
        event.preventDefault();
        activeKeys.add(key);
        
        // Single Taps & Rapid Taps checked immediately on press
        const needleX = canvas.width / 2;
        const currentItem = items.find(i => {
            const img = assets[`${i.id}-base`];
            const w = i.h * (img.width / img.height);
            const center = i.x + w/2;
            return center > needleX - 80 && center < needleX + 80 && !i.processed;
        });

        if (currentItem && !currentItem.hit) {
            if (currentItem.mech === 'rapid' && key === currentItem.col1) {
                currentItem.progress += 34; 
                if (currentItem.progress >= 100) success(currentItem);
                updateTicketUI();
            } else if (currentItem.mech === 'tap' && key === currentItem.col1) {
                success(currentItem);
            } else if (currentItem.mech === 'chord') {
                if (activeKeys.has(currentItem.col1) && activeKeys.has(currentItem.col2)) {
                    success(currentItem);
                }
            }
        }
    }

    function btnUp(key) {
        event.preventDefault();
        activeKeys.delete(key);
    }

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        updateLivesUI();
        gameActive = true;
        spawn();
        draw();
    }

    setTimeout(init, 300);

    function spawn() {
        if(!gameActive) return;
        const types = [
            { id: 'polo', mech: 'tap', h: 85 }, { id: 'banner', mech: 'hold', h: 65 },
            { id: 'sign', mech: 'chord', h: 105 }, { id: 'mug', mech: 'rapid', h: 75 }
        ];
        const t = types[Math.floor(Math.random() * types.length)];
        const colors = ['C', 'M', 'Y', 'K'];
        let c1 = colors[Math.floor(Math.random()*4)], c2 = colors[Math.floor(Math.random()*4)];
        while(c1 === c2) c2 = colors[Math.floor(Math.random()*4)];

        items.push({ ...t, x: -350, y: (canvas.height/2) - (t.h/2), col1: c1, col2: c2, progress: 0, hit: false, processed: false });
        updateTicketUI();
        setTimeout(spawn, Math.max(1000, 3000 - (score * 1.5)));
    }

    function updateTicketUI() {
        const area = document.getElementById('ticket-area');
        area.innerHTML = '';
        const next = items.find(i => !i.hit && !i.processed);
        if(!next) return;

        if(next.mech === 'hold') {
            const img = document.createElement('img');
            img.src = `assets/long-${next.col1.toLowerCase()}.svg`;
            img.className = 'ticket-img';
            area.appendChild(img);
        } else if(next.mech === 'chord') {
            [next.col1, next.col2].forEach(col => {
                const img = document.createElement('img');
                img.src = `assets/button-${col.toLowerCase()}.svg`;
                img.className = 'ticket-img';
                area.appendChild(img);
            });
        } else if(next.mech === 'rapid') {
            const remaining = 3 - Math.floor(next.progress / 33.4);
            for(let i=0; i < Math.max(0, remaining); i++) {
                const img = document.createElement('img');
                img.src = `assets/button-${next.col1.toLowerCase()}.svg`;
                img.className = 'ticket-img';
                area.appendChild(img);
            }
        } else {
            const img = document.createElement('img');
            img.src = `assets/button-${next.col1.toLowerCase()}.svg`;
            img.className = 'ticket-img';
            area.appendChild(img);
        }
    }

    function draw() {
        if(!gameActive) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        // Background: Proportional Scale to Cover
        if (assets.background.complete) {
            const img = assets.background;
            const screenRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            let drawW, drawH, drawX, drawY;

            if (screenRatio > imgRatio) {
                drawW = canvas.width;
                drawH = canvas.width / imgRatio;
                drawX = 0;
                drawY = (canvas.height - drawH) / 2;
            } else {
                drawW = canvas.height * imgRatio;
                drawH = canvas.height;
                drawX = (canvas.width - drawW) / 2;
                drawY = 0;
            }
            ctx.drawImage(img, drawX, drawY, drawW, drawH);
        }

        const needleX = canvas.width/2;
        const trackY = canvas.height/2;

        items.forEach(item => {
            item.x += speed;
            const img = assets[item.hit ? `${item.id}-branded` : `${item.id}-base`];
            if(img.complete) {
                const w = item.h * (img.width/img.height);
                ctx.drawImage(img, item.x, item.y, w, item.h);
                
                const center = item.x + w/2;
                const inZone = center > needleX - 85 && center < needleX + 85;

                // Hold Logic - Continuous check
                if (inZone && !item.hit && item.mech === 'hold') {
                    if (activeKeys.has(item.col1)) {
                        item.progress += 2.5; // Progress fills while held
                        if (item.progress >= 100) success(item);
                    }
                }

                if(item.x > needleX + 85 && !item.hit && !item.processed) { item.processed = true; fail(); }
            }
        });
        items = items.filter(i => i.x < canvas.width + 100);
        requestAnimationFrame(draw);
    }

    function success(item) {
        item.hit = true; item.processed = true;
        combo++; score += (10 * Math.min(5, Math.floor(combo/5)+1));
        document.getElementById('score').innerText = score;
        document.getElementById('mult').innerText = Math.min(5, Math.floor(combo/5)+1) + "x";
        updateTicketUI();
    }

    function fail() {
        combo = 0; lives--; updateLivesUI();
        document.getElementById('mult').innerText = "1x";
        if(lives <= 0) { gameActive = false; document.getElementById('overlay').style.display='flex'; document.getElementById('final-score').innerText = "TOTAL BRANDED: " + score; }
        updateTicketUI();
    }

    function updateLivesUI() {
        const c = document.getElementById('lives-container'); c.innerHTML = '';
        for(let i=0; i<3; i++) {
            const img = document.createElement('img');
            img.src = i < lives ? 'assets/heart-active.svg' : 'assets/heart-inactive.svg';
            img.className = 'heart'; c.appendChild(img);
        }
    }
</script>
</body>
</html>
