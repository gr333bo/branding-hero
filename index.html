<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Branding Hero</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #fff; font-family: sans-serif; overflow: hidden; 
        }
        
        /* Fixed HUD Height */
        #hud { 
            position: absolute; top: 0; left: 0; width: 100%; height: 130px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px; background: #fff; z-index: 10;
        }
        #stats { width: 100%; max-width: 400px; display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 8px; }
        
        /* The Ticket Box - All icons will have same vertical height */
        #job-preview { 
            height: 65px; display: flex; align-items: center; justify-content: center;
            gap: 12px; background: #fafafa; border: 2px solid #eee; border-radius: 12px; 
            padding: 5px 25px; min-width: 150px;
        }
        .ticket-img { height: 40px; width: auto; } /* Fixed vertical space */

        /* Fixed Controls Height */
        #controls-wrapper {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 320px;
            display: flex; align-items: center; justify-content: center; background: #fff; z-index: 10;
        }
        #controls { position: relative; width: 280px; height: 280px; }
        .btn { position: absolute; width: 100px; height: 100px; background-size: contain; background-repeat: no-repeat; cursor: pointer; }
        .y { top: 0; left: 90px; background-image: url('assets/button-y.svg'); }
        .c { top: 90px; left: 0; background-image: url('assets/button-c.svg'); }
        .m { top: 90px; right: 0; background-image: url('assets/button-m.svg'); }
        .k { bottom: 0; left: 90px; background-image: url('assets/button-k.svg'); }

        /* Flexible Game Canvas */
        canvas { position: absolute; top: 130px; left: 0; width: 100%; height: calc(100% - 450px); background: #fff; }

        #overlay { display: none; position: fixed; inset: 0; background: #fff; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .heart { width: 22px; height: 22px; margin-left: 4px; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="stats">
            <div>SCORE: <span id="score">0</span> <span id="mult" style="color:#ffcc00">1x</span></div>
            <div id="lives-container"></div>
        </div>
        <div id="job-preview">
            <div id="ticket-area" style="display:flex; align-items:center; gap:10px;"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls-wrapper">
        <div id="controls">
            <div class="btn y" onmousedown="press('Y')" ontouchstart="press('Y')"></div>
            <div class="btn c" onmousedown="press('C')" ontouchstart="press('C')"></div>
            <div class="btn m" onmousedown="press('M')" ontouchstart="press('M')"></div>
            <div class="btn k" onmousedown="press('K')" ontouchstart="press('K')"></div>
        </div>
    </div>

    <div id="overlay">
        <img src="assets/branding-hero-logo.svg" style="width:200px; margin-bottom:20px;">
        <h1 id="final-score"></h1>
        <button onclick="location.reload()" style="background:#000; color:#fff; padding:15px 40px; border:none; border-radius:50px; font-weight:bold; font-size:18px;">RESTART</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const assets = {};
    const assetList = [
        'polo-base', 'polo-branded', 'banner-base', 'banner-branded', 
        'sign-base', 'sign-branded', 'mug-base', 'mug-branded', 
        'heart-active', 'heart-inactive', 
        'button-c', 'button-m', 'button-y', 'button-k',
        'long-c', 'long-m', 'long-y', 'long-k'
    ];
    
    let score = 0, combo = 0, lives = 3, gameActive = false, speed = 2.5, items = [], activeKeys = new Set();

    assetList.forEach(name => { assets[name] = new Image(); assets[name].src = `assets/${name}.svg`; });

    function press(key) { activeKeys.add(key); event.preventDefault(); }
    window.onmouseup = window.ontouchend = () => activeKeys.clear();

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 450;
        updateLivesUI();
        gameActive = true;
        spawn();
        draw();
    }

    setTimeout(init, 300);

    function spawn() {
        if(!gameActive) return;
        const types = [
            { id: 'polo', mech: 'tap', h: 80 }, 
            { id: 'banner', mech: 'hold', h: 60 },
            { id: 'sign', mech: 'chord', h: 100 }, 
            { id: 'mug', mech: 'rapid', h: 70 }
        ];
        const t = types[Math.floor(Math.random() * types.length)];
        const colors = ['C', 'M', 'Y', 'K'];
        let c1 = colors[Math.floor(Math.random()*4)], c2 = colors[Math.floor(Math.random()*4)];
        while(c1 === c2) c2 = colors[Math.floor(Math.random()*4)];

        items.push({ ...t, x: -300, y: (canvas.height/2) - (t.h/2), col1: c1, col2: c2, progress: 0, hit: false, processed: false });
        updateTicketUI();
        setTimeout(spawn, Math.max(1000, 3000 - (score * 1.5)));
    }

    function updateTicketUI() {
        const area = document.getElementById('ticket-area');
        area.innerHTML = '';
        const next = items.find(i => !i.hit && !i.processed);
        if(!next) return;

        // Logic for which icons to show in the Ticket Box
        if(next.mech === 'hold') {
            // Use the "Long" assets for Hold mechanics
            const img = document.createElement('img');
            img.src = `assets/long-${next.col1.toLowerCase()}.svg`;
            img.className = 'ticket-img';
            area.appendChild(img);
        } else if(next.mech === 'chord') {
            // Tap both icons side-by-side
            [next.col1, next.col2].forEach(col => {
                const img = document.createElement('img');
                img.src = `assets/button-${col.toLowerCase()}.svg`;
                img.className = 'ticket-img';
                area.appendChild(img);
            });
        } else if(next.mech === 'rapid') {
            // Show three icons for Rapid/Rush mechanic
            for(let i=0; i<3; i++) {
                const img = document.createElement('img');
                img.src = `assets/button-${next.col1.toLowerCase()}.svg`;
                img.className = 'ticket-img';
                area.appendChild(img);
            }
        } else {
            // Single tap
            const img = document.createElement('img');
            img.src = `assets/button-${next.col1.toLowerCase()}.svg`;
            img.className = 'ticket-img';
            area.appendChild(img);
        }
    }

    function draw() {
        if(!gameActive) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const needleX = canvas.width/2;

        ctx.fillStyle = "#fafafa";
        ctx.fillRect(0, (canvas.height/2)-55, canvas.width, 110);

        items.forEach(item => {
            item.x += speed;
            const img = assets[item.hit ? `${item.id}-branded` : `${item.id}-base`];
            if(img.complete) {
                const w = item.h * (img.width/img.height);
                ctx.drawImage(img, item.x, item.y, w, item.h);
                
                const center = item.x + w/2;
                if(center > needleX - 50 && center < needleX + 50 && !item.processed) {
                    if(item.mech === 'tap' && activeKeys.has(item.col1)) success(item);
                    if(item.mech === 'chord' && activeKeys.has(item.col1) && activeKeys.has(item.col2)) success(item);
                    if(item.mech === 'hold' && activeKeys.has(item.col1)) { item.progress += 4; if(item.progress >= 100) success(item); }
                    if(item.mech === 'rapid' && activeKeys.has(item.col1)) { item.progress += 20; if(item.progress >= 100) success(item); }
                }
                if(item.x > needleX + 60 && !item.hit && !item.processed) { item.processed = true; fail(); }
            }
        });
        items = items.filter(i => i.x < canvas.width + 100);
        requestAnimationFrame(draw);
    }

    function success(item) {
        item.hit = true; item.processed = true;
        combo++; score += (10 * Math.min(5, Math.floor(combo/5)+1));
        document.getElementById('score').innerText = score;
        document.getElementById('mult').innerText = Math.min(5, Math.floor(combo/5)+1) + "x";
        updateTicketUI();
    }

    function fail() {
        combo = 0; lives--; updateLivesUI();
        document.getElementById('mult').innerText = "1x";
        if(lives <= 0) { gameActive = false; document.getElementById('overlay').style.display='flex'; document.getElementById('final-score').innerText = "TOTAL BRANDED: " + score; }
        updateTicketUI();
    }

    function updateLivesUI() {
        const c = document.getElementById('lives-container'); c.innerHTML = '';
        for(let i=0; i<3; i++) {
            const img = document.createElement('img');
            img.src = i < lives ? 'assets/heart-active.svg' : 'assets/heart-inactive.svg';
            img.className = 'heart'; c.appendChild(img);
        }
    }
</script>
</body>
</html>
